# These Edge Functions authenticate users with Clerk tokens (not Supabase JWTs),
# so the Supabase gateway must NOT verify the JWT — each function verifies the
# Clerk token itself via verifyClerkUser(). Without verify_jwt = false the gateway
# rejects the Clerk token with 401 before the function code runs.
[functions.append-doppler-data]
verify_jwt = false

[functions.list-doppler-data]
verify_jwt = false

[functions.update-doppler-fp]
verify_jwt = false

[functions.delete-doppler-rows]
verify_jwt = false

